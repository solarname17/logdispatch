name: Publish to Maven Central

on:
  # Allows you to trigger this workflow manually from the Actions tab
  workflow_dispatch:
  # Automatically triggers when a new GitHub Release is published
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          # This configures settings.xml with the "central" server id
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          # This securely imports your GPG key for the maven-gpg-plugin
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Publish package
        run: ./mvnw clean deploy -B
        env:
          # These map to your GitHub Repository Secrets
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
